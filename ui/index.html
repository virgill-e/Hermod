<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PyPost — Client HTTP Local</title>
  <meta name="description" content="Client HTTP desktop local, open-source, sans compte." />

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
    rel="stylesheet" />

  <!-- Application CSS -->
  <link rel="stylesheet" href="/css/app.css" />

  <!-- highlight.js — thème clair -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

  <!-- Alpine.js -->
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>

<body x-data="pypost()" x-init="init()">
  <div id="app">

    <!-- ── TOP BAR ──────────────────────────────────────────────────────────── -->
    <header id="top-bar">

      <!-- Logo -->
      <span class="logo">⚡ PyPost</span>

      <!-- Tabs -->
      <div id="tab-bar">
        <template x-for="(tab, i) in tabs" :key="tab.id">
          <button :id="'tab-' + tab.id" class="tab-item" :class="{ active: activeTab === i }"
            @click="activeTab = i; response = null; error = null">
            <span class="font-bold text-[10px]" :class="'badge-' + tab.method" x-text="tab.method"></span>
            <span x-text="tab.name || 'Sans titre'"></span>
            <span class="tab-dirty" x-show="tab.dirty">●</span>
            <span class="tab-close" @click.stop="closeTab(i)">✕</span>
          </button>
        </template>
        <button id="btn-new-tab" @click="newTab()" title="Nouvel onglet">＋</button>
      </div>

      <!-- Right side -->
      <div style="display:flex; align-items:center; gap:8px; margin-left:auto; flex-shrink:0;">
        <select id="env-selector" class="env-select" x-model="activeEnv">
          <option value="">Aucun environnement</option>
          <template x-for="env in environments" :key="env.id">
            <option :value="env.id" x-text="env.name"></option>
          </template>
        </select>
        <button id="btn-settings" class="icon-btn" title="Paramètres">⚙️</button>
      </div>
    </header>

    <!-- ── MAIN ─────────────────────────────────────────────────────────────── -->
    <div id="main">

      <!-- ── SIDEBAR ────────────────────────────────────────────────────────── -->
      <aside id="sidebar">

        <!-- Sidebar navigation tabs -->
        <div class="sidebar-tabs">
          <button id="sidebar-tab-collections" class="sidebar-tab" :class="{ active: sidebarTab === 'collections' }"
            @click="sidebarTab = 'collections'">Collections</button>
          <button id="sidebar-tab-history" class="sidebar-tab" :class="{ active: sidebarTab === 'history' }"
            @click="sidebarTab = 'history'">Historique</button>
        </div>

        <!-- Collections tab content -->
        <div style="display:flex; flex-direction:column; flex:1; min-height:0;" x-show="sidebarTab === 'collections'">
          <div class="sidebar-search">
            <input id="search-collections" type="text" x-model="collectionSearch" placeholder="Rechercher…" />
          </div>
          <div class="sidebar-content">
            <div class="empty-state" x-show="filteredCollections.length === 0">
              <div class="empty-icon">📁</div>
              Aucune collection
            </div>
            <template x-for="col in filteredCollections" :key="col.id">
              <div>
                <button class="collection-header" @click="col.open = !col.open">
                  <span style="color:var(--text-muted); width:12px;" x-text="col.open ? '▾' : '▸'"></span>
                  <span>📁</span>
                  <span style="flex:1; text-align:left; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;"
                    x-text="col.name"></span>
                </button>
                <div x-show="col.open">
                  <template x-for="req in col.requests" :key="req.id">
                    <button class="req-item" @click="openRequest(req)">
                      <span class="font-bold" style="font-size:10px; width:44px; text-align:right;"
                        :class="'badge-' + req.method" x-text="req.method"></span>
                      <span style="overflow:hidden; text-overflow:ellipsis; white-space:nowrap;"
                        x-text="req.name"></span>
                    </button>
                  </template>
                </div>
              </div>
            </template>
          </div>
          <div class="sidebar-footer">
            <button id="btn-new-collection" class="btn-add">＋ Nouvelle collection</button>
          </div>
        </div>

        <!-- History tab content -->
        <div style="display:flex; flex-direction:column; flex:1; min-height:0;" x-show="sidebarTab === 'history'">
          <div class="sidebar-content">
            <div class="empty-state" x-show="history.length === 0">
              <div class="empty-icon">🕐</div>
              Aucun historique
            </div>
            <template x-for="entry in history" :key="entry.id">
              <button class="history-item" @click="loadFromHistory(entry)">
                <span class="font-bold" style="font-size:10px; width:44px; text-align:right;"
                  :class="'badge-' + entry.method" x-text="entry.method"></span>
                <span style="flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;"
                  x-text="entry.url"></span>
                <span :style="entry.status >= 400 ? 'color:var(--clr-error)' : 'color:var(--clr-success)'"
                  x-text="entry.status"></span>
              </button>
            </template>
          </div>
          <div class="sidebar-footer">
            <button id="btn-clear-history" class="btn-danger-text" @click="history = []">🗑 Vider l'historique</button>
          </div>
        </div>
      </aside>

      <!-- Resize handle -->
      <div id="resize-handle" @mousedown="startResize($event)"></div>

      <!-- ── CENTER PANEL ────────────────────────────────────────────────────── -->
      <div id="center">

        <!-- URL Bar -->
        <div id="url-bar">
          <select id="method-select" x-model="currentTab.method" :class="'badge-' + currentTab.method">
            <option>GET</option>
            <option>POST</option>
            <option>PUT</option>
            <option>PATCH</option>
            <option>DELETE</option>
            <option>HEAD</option>
            <option>OPTIONS</option>
          </select>

          <input id="url-input" type="text" x-model="currentTab.url" @input="currentTab.dirty = true"
            @keydown.enter="sendRequest()" placeholder="https://api.example.com/{{path}}" />

          <button id="btn-send" @click="sendRequest()" :disabled="loading">
            <span class="spinner" x-show="loading"></span>
            <span x-text="loading ? 'Envoi…' : 'Envoyer'"></span>
          </button>
        </div>

        <!-- Request param tabs -->
        <div class="panel-tabs">
          <template x-for="t in ['Params', 'Headers', 'Body', 'Auth', 'Scripts', 'Tests']" :key="t">
            <button :id="'req-tab-' + t.toLowerCase()" class="panel-tab" :class="{ active: requestTab === t }"
              @click="requestTab = t" x-text="t"></button>
          </template>
        </div>

        <!-- Request panel -->
        <div id="request-panel">

          <!-- Params -->
          <div class="panel-content fade-in" x-show="requestTab === 'Params'">
            <table class="kv-table">
              <thead>
                <tr>
                  <th style="width:24px;"></th>
                  <th>Clé</th>
                  <th>Valeur</th>
                  <th style="width:24px;"></th>
                </tr>
              </thead>
              <tbody>
                <template x-for="(p, i) in currentTab.params" :key="i">
                  <tr>
                    <td><input type="checkbox" x-model="p.enabled" style="accent-color:var(--accent);" /></td>
                    <td><input type="text" class="kv-input" x-model="p.key" placeholder="clé" /></td>
                    <td><input type="text" class="kv-input" x-model="p.value" placeholder="valeur" /></td>
                    <td><button class="btn-del-row" @click="currentTab.params.splice(i,1)">✕</button></td>
                  </tr>
                </template>
              </tbody>
            </table>
            <button class="btn-add-row" @click="currentTab.params.push({key:'',value:'',enabled:true})">＋ Ajouter un
              paramètre</button>
          </div>

          <!-- Headers -->
          <div class="panel-content fade-in" x-show="requestTab === 'Headers'">
            <table class="kv-table">
              <thead>
                <tr>
                  <th style="width:24px;"></th>
                  <th>Header</th>
                  <th>Valeur</th>
                  <th style="width:24px;"></th>
                </tr>
              </thead>
              <tbody>
                <template x-for="(h, i) in currentTab.headers" :key="i">
                  <tr>
                    <td><input type="checkbox" x-model="h.enabled" style="accent-color:var(--accent);" /></td>
                    <td><input type="text" class="kv-input" x-model="h.key" placeholder="Content-Type" /></td>
                    <td><input type="text" class="kv-input" x-model="h.value" placeholder="application/json" /></td>
                    <td><button class="btn-del-row" @click="currentTab.headers.splice(i,1)">✕</button></td>
                  </tr>
                </template>
              </tbody>
            </table>
            <button class="btn-add-row" @click="currentTab.headers.push({key:'',value:'',enabled:true})">＋ Ajouter un
              header</button>
          </div>

          <!-- Body -->
          <div class="panel-content fade-in" x-show="requestTab === 'Body'">
            <div class="body-types">
              <template x-for="bt in ['none','raw JSON','form-data','urlencoded']" :key="bt">
                <label>
                  <input type="radio" :value="bt" x-model="currentTab.bodyType" />
                  <span x-text="bt"></span>
                </label>
              </template>
            </div>
            <textarea class="body-textarea" x-show="currentTab.bodyType === 'raw JSON'" x-model="currentTab.body"
              placeholder='{"key": "value"}' rows="5"></textarea>
            <div x-show="currentTab.bodyType === 'none'" style="color:var(--text-muted); font-size:12px;">Aucun body
              envoyé.</div>
            <div x-show="currentTab.bodyType === 'form-data' || currentTab.bodyType === 'urlencoded'"
              style="color:var(--text-muted); font-size:12px;">🚧 Disponible prochainement.</div>
          </div>

          <!-- Auth -->
          <div class="panel-content fade-in" x-show="requestTab === 'Auth'">
            <div class="auth-row">
              <label>Type :</label>
              <select id="auth-type-select" class="auth-select" x-model="currentTab.authType">
                <option value="none">Aucune</option>
                <option value="bearer">Bearer Token</option>
                <option value="basic">Basic Auth</option>
                <option value="apikey">API Key</option>
              </select>
            </div>
            <div x-show="currentTab.authType === 'bearer'" class="fade-in">
              <input type="text" class="auth-input" x-model="currentTab.authToken" placeholder="Bearer token…" />
            </div>
            <div x-show="currentTab.authType === 'basic'" class="auth-row-fields fade-in">
              <input type="text" class="auth-input" x-model="currentTab.authUser" placeholder="Username" />
              <input type="password" class="auth-input" x-model="currentTab.authPass" placeholder="Password" />
            </div>
            <div x-show="currentTab.authType === 'apikey'" class="auth-row-fields fade-in">
              <input type="text" class="auth-input" x-model="currentTab.apiKeyName"
                placeholder="Header name (ex: X-API-Key)" />
              <input type="text" class="auth-input" x-model="currentTab.apiKeyValue" placeholder="Valeur" />
            </div>
          </div>

          <!-- Scripts / Tests -->
          <div class="placeholder-panel fade-in" x-show="requestTab === 'Scripts' || requestTab === 'Tests'">
            🚧 Disponible en Phase 3.
          </div>
        </div>

        <!-- ── RESPONSE PANEL ──────────────────────────────────────────────── -->
        <div id="response-panel">

          <!-- Response bar -->
          <div id="response-bar">

            <!-- Status when response available -->
            <template x-if="response && !loading">
              <div style="display:flex; align-items:center; gap:10px;" class="fade-in">
                <span class="status-badge"
                  :class="response.status >= 500 ? 'status-5xx' : response.status >= 400 ? 'status-4xx' : response.status >= 300 ? 'status-3xx' : 'status-2xx'"
                  x-text="response.status + ' ' + response.status_text"></span>
                <span class="res-meta" x-text="response.time_ms + ' ms'"></span>
                <span class="res-meta" x-text="formatBytes(response.size_bytes)"></span>
              </div>
            </template>

            <!-- Loading state -->
            <template x-if="loading">
              <span style="display:flex; align-items:center; gap:6px; color:var(--text-muted);" class="fade-in">
                <span class="spinner"></span> Envoi en cours…
              </span>
            </template>

            <!-- Idle state -->
            <template x-if="!response && !loading && !error">
              <span style="color:var(--text-muted);">Envoie une requête pour voir la réponse.</span>
            </template>

            <!-- Response sub-tabs + copy btn -->
            <div class="res-tab-group" x-show="response || error">
              <template x-for="t in ['Body', 'Headers', 'Info']" :key="t">
                <button :id="'res-tab-' + t.toLowerCase()" class="panel-tab" :class="{ active: responseTab === t }"
                  @click="responseTab = t" x-text="t"></button>
              </template>
              <button id="btn-copy-body" @click="copyBody()" class="icon-btn" title="Copier le body" x-show="response"
                style="margin-left:4px;">📋</button>
            </div>
          </div>

          <!-- Response body -->
          <div id="response-body-wrapper">

            <!-- Error -->
            <div class="error-box fade-in" x-show="error && !loading">
              <strong>⚠ Erreur réseau</strong>
              <span x-text="error"></span>
            </div>

            <!-- Body tab -->
            <template x-if="response && responseTab === 'Body'">
              <pre class="fade-in"><code id="response-body" x-text="prettyBody(response.body)"></code></pre>
            </template>

            <!-- Headers tab -->
            <template x-if="response && responseTab === 'Headers'">
              <table class="headers-table fade-in">
                <tbody>
                  <template x-for="[k, v] in Object.entries(response.headers || {})" :key="k">
                    <tr>
                      <td x-text="k"></td>
                      <td x-text="v"></td>
                    </tr>
                  </template>
                </tbody>
              </table>
            </template>

            <!-- Info tab -->
            <template x-if="response && responseTab === 'Info'">
              <table class="info-table fade-in">
                <tbody>
                  <tr>
                    <td>URL</td>
                    <td x-text="currentTab.url"></td>
                  </tr>
                  <tr>
                    <td>Méthode</td>
                    <td x-text="currentTab.method"></td>
                  </tr>
                  <tr>
                    <td>Date</td>
                    <td x-text="response.timestamp"></td>
                  </tr>
                  <tr>
                    <td>Taille</td>
                    <td x-text="formatBytes(response.size_bytes)"></td>
                  </tr>
                  <tr>
                    <td>Durée</td>
                    <td x-text="response.time_ms + ' ms'"></td>
                  </tr>
                </tbody>
              </table>
            </template>

            <!-- Idle -->
            <div class="response-empty" x-show="!response && !error && !loading">
              <div class="hint-icon">⚡</div>
              Appuie sur <strong>Envoyer</strong> pour voir la réponse ici.
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- ── STATUS BAR ────────────────────────────────────────────────────────── -->
    <footer id="status-bar">
      <span>PyPost v0.1.0-dev</span>
      <span
        x-text="activeEnv ? '🌍 ' + (environments.find(e => e.id === activeEnv)?.name || '') : '⚪ Aucun environnement'"></span>
    </footer>

  </div>

  <!-- Application JS -->
  <script src="/js/app.js"></script>
</body>

</html>
